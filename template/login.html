{%extends 'base.html' %}

{%block content%}
<h1>Login</h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {{form.as_p}}

    {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
    {% endif %}

    <button type="submit">Login</button>
</form>

<h2>Not registered yet?<a href="{% url 'register' %}"><strong>Register</strong></a></h2>
{%endblock content%}
