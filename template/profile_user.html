{% extends 'base.html' %}

{% block title %}Profile of {{reader.name}}{% endblock title %}

{%block content%}
    <div class='profile-card'>
        {% if reader.pfp %}
        <img src="{{ reader.pfp.url }}" alt="{{ reader.name }}" width="150">
    {% endif %}
        <h1>{{reader.name}}</h1>
        <p>{{reader.email}}</p>
        {% for book in borrow_list %}{{book}}<br>{% endfor %}
    </div>

{%endblock content%}
